<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 메인 페이지</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 커스텀 스타일 (LOL 테마 + 챔피언 호버 효과) -->
    <link rel="stylesheet" href="/css/index.css">

</head>

<body>

    <!-- 헤더 (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/#"><img src="/res/img/LOL.webp" alt="League of Legends" width="30"
                    height="24"></a>
            <button class="btn border-0" id="themeToggleBtn">🌙 DARK </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">챔피언</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/sub/download.html#">다운로드</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/login">로그인</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false" href="#">외부 사이트</a>
                        <ul class="dropdown-menu">
                            <li><a href="https://www.leageoflegends.com/ko-kr/" class="dropdown-item" target="_blank">공식
                                    사이트</a></li>
                            <li><a href="https://lol.ps" class="dropdown-item" target="_blank">전적 보기</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a href="https://youtube.com/" class="dropdown-item" target="_blank">관련 유튜브 채널</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a href="#" class="nav-link btn btn.primary btn-lg" id="playLeague">무료
                            플레이</a></li>
                </ul>
                <form role="search" class="d-flex" id="searchForm">
                    <input type="search" placeholder="검색..." aria-label="Search" class="form-control me-2"
                        id="searchInput">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>


    <!-- 네비바 → index.html과 동일하게 복사 -->
    <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
        <div class="container" style="max-width: 400px;">
            <h2 class="fw-bold mb-4"> 가입 완료!</h2>
            <p class="lead mb-4">
                환영합니다!<br>
                가입이 완료되었습니다.<br>
                로그인 후 서비스를 이용해보세요.
            </p>
            <a href="/login" class="btn btn-primary w-100">
                로그인 하러 가기
            </a>
        </div>
    </section>

    <!-- <footer>
        Resources copyright (c) Riot Games.<br>
        "League of Legends" and its logos are trademarks of Riot Games.
    </footer> -->

    <div class="toast-container position-fixed
bottom-0 end-0 p-3" style="z-index:9999">
        <div id="liveToast" class="toast align-items-center
text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">
                    메시지
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="/js/toast.js"></script>
    <script>window.onload = () => showToast('회원가입이 완료되었습니다!')</script>

    <!-- late include script: enable ID search-->
    <!-- <script src="/js/search.js"></script> -->
    <script src="/js/toggle.js"></script>
</body>

</html>
