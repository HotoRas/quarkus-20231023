<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 메인 페이지</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 커스텀 스타일 (LOL 테마 + 챔피언 호버 효과) -->
    <link rel="stylesheet" href="/css/index.css">
    <!-- <script src="/js/test.js"></script> -->

</head>

<body>
    <!-- 헤더 (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/#"><img src="/res/img/LOL.webp" alt="League of Legends" width="30"
                    height="24"></a>
            <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">🌙 DARK </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">챔피언</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/sub/download.html#">다운로드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile" id="profileNavLink" data-bs-toggle="tooltip"
                            data-bs-placement="bottom">👤 프로필</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-danger btn-sm px-3" href="/logout">로그아웃</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false" href="#">외부 사이트</a>
                        <ul class="dropdown-menu">
                            <li><a href="https://www.leageoflegends.com/ko-kr/" class="dropdown-item" target="_blank">공식
                                    사이트</a></li>
                            <li><a href="https://lol.ps" class="dropdown-item" target="_blank">전적 보기</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a href="https://youtube.com/" class="dropdown-item" target="_blank">관련 유튜브 채널</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a href="#" class="nav-link btn btn.primary btn-lg"
                            onclick="alert('즐거운 플레이 되세요')">무료
                            플레이</a></li>
                </ul>
                <form role="search" class="d-flex" id="searchForm">
                    <input type="search" placeholder="검색..." aria-label="Search" class="form-control me-2"
                        id="searchInput">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>


    <!-- 네비바 → /after-login과 동일하게 복사 -->
    <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
        <div class="container" style="max-width: 500px;">
            <h2 class="fw-bold mb-4"> 내 프로필</h2>
            <!-- 프로필 사진 영역 -->
            <div class="mb-4">
                <img id="profileImg" src="/uploads/profile/default.jpg" class="rounded-circle" width="120" height="120"
                    style="object-fit:cover; border:3px solid #fff;" alt="프로필 사진">
            </div>
            <!-- 개인 정보 출력 -->
            <div id="userinfoWrapper" class="card bg-dark text-white border-secondary mb-4">
                <div class="card-body text-start">
                    <table id="userinfoContainer" class="table table-dark table-bordered mb-0">
                        <tr>
                            <th style="width:30%">아이디</th>
                            <td id="infoUsername"></td>
                        </tr>
                        <tr>
                            <th>이메일</th>
                            <td id="infoEmail"></td>
                        </tr>
                        <tr>
                            <th>연락처</th>
                            <td id="infoPhone"></td>
                        </tr>
                    </table>
                </div>
            </div>
            <!-- 사진 업로드 폼 -->
            <form id="uploadForm" method="POST" action="/profile/upload" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">프로필 사진 변경</label>
                    <input type="file" class="form-control" id="profileFile" name="profileImage"
                        accept="image/jpeg,image/png,image/gif,image/webp">
                    <div class="form-text text-muted">
                        jpg, png, gif, webp / 최대 5MB
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    사진 업로드
                </button>
            </form>
        </div>
    </section>


    <!-- <footer>
        Resources copyright (c) Riot Games.<br>
        "League of Legends" and its logos are trademarks of Riot Games.
    </footer> -->


    <div class="toast-container position-fixed
bottom-0 end-0 p-3" style="z-index:9999">
        <div id="liveToast" class="toast align-items-center
text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">
                    메시지
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script src="/js/test.js"></script>
    <script src="/js/profile.js"></script>

    <!-- late include script: enable ID search-->
    <!-- <script src="/js/search.js"></script> -->
    <script src="/js/toggle.js"></script>
</body>

</html>
