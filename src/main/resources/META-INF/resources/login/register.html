<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 메인 페이지</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 커스텀 스타일 (LOL 테마 + 챔피언 호버 효과) -->
    <link rel="stylesheet" href="/css/index.css">

</head>

<body>

    <!-- 헤더 (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/#"><img src="/res/img/LOL.webp" alt="League of Legends" width="30"
                    height="24"></a>
            <button class="btn border-0" id="themeToggleBtn">🌙 DARK </button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">뉴스</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/#">챔피언</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/sub/download.html#">다운로드</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="/login">로그인</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false" href="#">외부 사이트</a>
                        <ul class="dropdown-menu">
                            <li><a href="https://www.leageoflegends.com/ko-kr/" class="dropdown-item" target="_blank">공식
                                    사이트</a></li>
                            <li><a href="https://lol.ps" class="dropdown-item" target="_blank">전적 보기</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a href="https://youtube.com/" class="dropdown-item" target="_blank">관련 유튜브 채널</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a href="#" class="nav-link btn btn.primary btn-lg" id="playLeague">무료
                            플레이</a></li>
                </ul>
                <form role="search" class="d-flex" id="searchForm">
                    <input type="search" placeholder="검색..." aria-label="Search" class="form-control me-2"
                        id="searchInput">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>


    <!-- 네비바 → index.html과 동일하게 복사 -->
    <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
        <div class="container" style="max-width: 480px;">
            <h2 class="fw-bold mb-4">회원가입</h2>
            <form id="registerForm" action="/register_check" method="post">
                <!-- 아이디 -->
                <div class="mb-3 text-start">
                    <label class="form-label">아이디 *</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="4~20자 영문/숫자"
                        required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>
                <!-- 패스워드 -->
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 *</label>
                    <input type="password" class="form-control" id="password" placeholder="8자 이상, 영문+숫자+특수문자" required>
                </div>
                <!-- 패스워드 확인 -->
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 확인 *</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="패스워드 재입력" required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                </div>
                <!-- 이메일 -->
                <div class="mb-3 text-start">
                    <label class="form-label">이메일 *</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com"
                        required>
                    <div class="invalid-feedback" id="emailMsg"></div>
                </div>
                <!-- 연락처 -->
                <div class="mb-3 text-start">
                    <label class="form-label">연락처 *</label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="010-0000-0000"
                        required>
                    <div class="invalid-feedback" id="phoneMsg"></div>
                </div>
                <input type="hidden" id="hashedPassword" name="password">
                <button type="button" class="btn btn-primary w-100" onclick="validateAndShowModal()">
                    회원가입
                </button>
            </form>
        </div>
    </section>

    <div id="confirmModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">가입 확인</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>아래 정보로 가입하시겠습니까?</p>
                    <table class="table table-dark table-bordered">
                        <tr>
                            <th>아이디</th>
                            <td id="confirmUsername"></td>
                        </tr>
                        <tr>
                            <th>이메일</th>
                            <td id="confirmEmail"></td>
                        </tr>
                        <tr>
                            <th>연락처</th>
                            <td id="confirmPhone"></td>
                        </tr>
                        <tr>
                            <th>패스워드</th>
                            <td>******** (암호화 전송)</td>
                        </tr>
                    </table>
                </div>

                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="submitRegister()">가입하기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed
bottom-0 end-0 p-3" style="z-index:9999">
        <div id="liveToast" class="toast align-items-center
text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">
                    메시지
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script src="/js/toast.js"></script>
    <script>window.onload = () => showToast('회원가입 페이지 로딩 완료')</script>
    <script src="/js/input_check.js"></script>
    <script src="/js/input_sha256.js"></script>

</body>

</html>
